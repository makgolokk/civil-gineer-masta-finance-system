name: Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  deploy:
    name: Push production database migrations
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured as a GitHub secret."
              missing=1
            fi
          done
          exit "$missing"

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show migration status before push
        run: supabase migration list

      - name: Push pending migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Show migration status after push
        run: supabase migration list
